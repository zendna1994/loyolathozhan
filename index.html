<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loyola Thozhan | Official Campus Assistant</title>
    <style>
        :root { --navy: #002147; --gold: #B8860B; --light: #f8f9fa; }
        
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #d1d1d1; margin: 0; overflow: hidden; }

        /* Floating Launcher */
        #launcher {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px; background: var(--navy);
            border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1001;
            border: 2px solid var(--gold);
            transition: transform 0.2s ease;
        }
        #launcher:active { transform: scale(0.9); }
        #launcher img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }

        /* Chat Window Container */
        #chat-window {
            position: fixed; bottom: 90px; right: 20px;
            width: calc(100% - 40px); max-width: 400px; height: 75vh; max-height: 600px;
            background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: none; flex-direction: column; overflow: hidden; z-index: 1000;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Header */
        #header { 
            background: var(--navy); color: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--gold);
        }
        .header-profile { display: flex; align-items: center; gap: 10px; }
        .header-profile img { width: 35px; height: 35px; border-radius: 6px; background: white; padding: 2px; }
        .header-titles b { display: block; font-size: 14px; }
        .header-titles span { font-size: 10px; color: #4caf50; display: flex; align-items: center; gap: 4px; }

        .controls { display: flex; gap: 5px; }
        .ctrl-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* Messages Area with Watermark */
        #messages { 
            flex: 1; padding: 15px; overflow-y: auto; 
            background: white url('https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg') no-repeat center;
            background-size: 220px; background-attachment: local;
            position: relative; display: flex; flex-direction: column; gap: 12px;
        }
        /* Readable Overlay */
        #messages::before {
            content: ""; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.9); z-index: 0;
        }

        .msg { z-index: 1; max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; word-wrap: break-word; animation: slideUp 0.3s ease; }
        .bot { background: #f1f3f4; color: var(--navy); align-self: flex-start; border-bottom-left-radius: 2px; border-left: 3px solid var(--gold); }
        .user { background: var(--navy); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Suggestions */
        .sug-box { z-index: 1; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .sug-btn { background: white; border: 1px solid var(--navy); color: var(--navy); padding: 6px 12px; border-radius: 18px; font-size: 12px; cursor: pointer; }
        .sug-btn:hover { background: var(--navy); color: white; }

        /* Input Area */
        #input-bar { padding: 12px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
        #user-msg { flex: 1; border: 1px solid #ddd; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        #send-btn { background: none; border: none; color: var(--navy); font-weight: bold; cursor: pointer; padding: 5px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Mobile Tweaks */
        @media (max-width: 480px) {
            #chat-window { width: calc(100% - 20px); right: 10px; bottom: 80px; height: 80vh; }
        }
    </style>
</head>
<body>

<div id="launcher" onclick="toggleChat()"><img src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg"></div>

<div id="chat-window">
    <div id="header">
        <div class="header-profile">
            <img src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg">
            <div class="header-titles">
                <b>Loyola Thozhan</b>
                <span>● Active Assistant</span>
            </div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" onclick="clearHistory()">Clear</button>
            <button class="ctrl-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="messages"></div>

    <div id="input-bar">
        <input type="text" id="user-msg" placeholder="Ask Thozhan..." onkeypress="if(event.key==='Enter') processText()">
        <button id="send-btn" onclick="processText()">SEND</button>
    </div>
</div>

<script>
    let step = 0;
    let user = { name: '', role: '', shift: '', dept: '' };
    const msgBox = document.getElementById('messages');
    const input = document.getElementById('user-msg');

    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        if (win.style.display === 'flex' && step === 0) runOnboarding();
    }

    function addMsg(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
    }

    function showSug(list) {
        const div = document.createElement('div');
        div.className = 'sug-box';
        list.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'sug-btn';
            btn.innerText = item;
            btn.onclick = () => { addMsg(item, 'user'); handleLogic(item); };
            div.appendChild(btn);
        });
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
    }

    function runOnboarding() {
        const data = localStorage.getItem('lt_profile');
        if(data) {
            user = JSON.parse(data);
            addMsg(`Vanakkam, ${user.name}! Welcome back to Loyola.`, 'bot');
            mainMenu();
        } else {
            addMsg("Vanakkam! I am your Loyola Thozhan. To start, what is your Full Name?", 'bot');
            step = 1;
        }
    }

    function processText() {
        const val = input.value.trim();
        if(!val) return;
        addMsg(val, 'user');
        input.value = '';
        handleLogic(val);
    }

    function handleLogic(val) {
        setTimeout(() => {
            if(step === 1) {
                user.name = val;
                addMsg(`Nice to meet you, ${val}. Please select your role:`, 'bot');
                showSug(['Student', 'Staff', 'Guest']);
                step = 2;
            } else if(step === 2) {
                user.role = val;
                if(val === 'Student') {
                    addMsg("Which shift are you in?", 'bot');
                    showSug(['Shift 1', 'Shift 2']);
                    step = 3;
                } else { finishOnboarding(); }
            } else if(step === 3) {
                user.shift = val;
                addMsg("Enter your Department Code (e.g. 24-UAZ-050):", 'bot');
                step = 4;
            } else if(step === 4) {
                user.dept = val;
                finishOnboarding();
            } else {
                searchDatabase(val);
            }
        }, 500);
    }

    function finishOnboarding() {
        localStorage.setItem('lt_profile', JSON.stringify(user));
        step = 10; 
        addMsg("Profile verified! How can I assist you today?", 'bot');
        mainMenu();
    }

    function mainMenu() {
        showSug(['History', 'Who is Who', 'Scholarships', 'OD/ML Procedure', 'End Chat']);
    }

    function searchDatabase(q) {
        const query = q.toLowerCase();
        if(query.includes('history')) {
            addMsg("Loyola College was founded in 1925 by the Society of Jesus (Jesuits). It has been a pioneer in higher education for over 100 years!", 'bot');
        } else if(query.includes('who is who')) {
            addMsg("Rector: Rev. Dr. Antony Robinson, SJ <br>Secretary and Correspond: Rev. Dr. D. Thomas Alexander SJ<br>Principal :Rev. Dr. A. Louis Arockiaraj, SJ", 'bot');
        } else if(query.includes('scholarship')) {
            addMsg("Loyola offers Management & Govt scholarships. Visit the Loyola Student Support Service (LSSS) at CEF-01 (Commerce, Economis Block)", 'bot');
        } else if(query.includes('end chat')) {
            addMsg("Thank you for using Loyola Thozhan! Closing window...", 'bot');
            setTimeout(toggleChat, 1500);
        } else {
            addMsg("I'm still learning about that. Let me check the college database...", 'bot');
        }
        setTimeout(mainMenu, 1000);
    }

    function clearHistory() {
        msgBox.innerHTML = '';
        addMsg("Chat history cleared.", 'bot');
        mainMenu();
    }

    function logout() {
        if(confirm("Logout and delete profile?")) {
            localStorage.removeItem('lt_profile');
            location.reload();
        }
    }
</script>
</body>
</html>
