<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyola Thozhan | Campus Assistant</title>
    <style>
        :root {
            --primary: #002147; /* Loyola Navy */
            --accent: #B8860B;  /* Burnished Gold */
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Chat Container */
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ddd; }
        
        /* Header */
        #header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; gap: 10px; }
        #header img { width: 45px; height: 45px; border-radius: 8px; border: 2px solid var(--accent); }
        #header-text h2 { margin: 0; font-size: 18px; }
        #header-text p { margin: 0; font-size: 12px; opacity: 0.8; }

        /* Messages Area */
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .bot { background: #e8f0fe; align-self: flex-start; border-bottom-left-radius: 2px; color: var(--primary); }
        .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Input Area */
        #input-area { border-top: 1px solid #eee; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 5px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--accent); }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <img src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg" alt="Logo">
        <div id="header-text">
            <h2>Loyola Thozhan</h2>
            <p>லோயோலா தோழன் | Campus Guide</p>
        </div>
    </div>
    <div id="messages">
        <div class="msg bot">Vanakkam! I am your Loyola Thozhan. How can I help you with department details today?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask me about a department...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        // Placeholder for Google Apps Script connection
        appendMessage("Thinking...", 'bot');
        
        // This is where we will fetch from your Google Script later
        // const response = await fetch('YOUR_SCRIPT_URL', { method: 'POST', body: text });
    }

    function appendMessage(text, side) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${side}`;
        msgDiv.innerText = text;
        document.getElementById('messages').appendChild(msgDiv);
        msgDiv.scrollIntoView();
    }
</script>

</body>
</html>
