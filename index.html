<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loyola Thozhan | Official Campus Assistant</title>
    <style>
        :root { --navy: #002147; --gold: #B8860B; --light: #f8f9fa; }
        
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #d1d1d1; margin: 0; overflow: hidden; }

        /* Floating Launcher */
        #launcher {
            position: fixed; bottom: 20px; right: 20px;
            width: 65px; height: 65px; background: var(--navy);
            border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1001;
            border: 2px solid var(--gold);
            transition: transform 0.2s ease;
        }
        #launcher:active { transform: scale(0.9); }
        #launcher img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }

        /* Chat Window */
        #chat-window {
            position: fixed; bottom: 95px; right: 20px;
            width: calc(100% - 40px); max-width: 400px; height: 75vh; max-height: 600px;
            background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: none; flex-direction: column; overflow: hidden; z-index: 1000;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Header */
        #header { 
            background: var(--navy); color: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--gold);
        }
        .header-profile { display: flex; align-items: center; gap: 10px; }
        .header-profile img { width: 35px; height: 35px; border-radius: 6px; background: white; padding: 2px; }
        .header-titles b { display: block; font-size: 14px; }
        .header-titles span { font-size: 10px; color: #4caf50; display: flex; align-items: center; gap: 4px; }

        .controls { display: flex; gap: 5px; }
        .ctrl-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 5px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* Messages Area with Watermark */
        #messages { 
            flex: 1; padding: 15px; overflow-y: auto; 
            background: white url('https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg') no-repeat center;
            background-size: 220px; background-attachment: local;
            position: relative; display: flex; flex-direction: column; gap: 12px;
        }
        #messages::before {
            content: ""; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.92); z-index: 0;
        }

        .msg { z-index: 1; max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; animation: slideUp 0.3s ease; }
        .bot { background: #f1f3f4; color: var(--navy); align-self: flex-start; border-bottom-left-radius: 2px; border-left: 3px solid var(--gold); }
        .user { background: var(--navy); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .speak-btn { cursor: pointer; margin-left: 8px; font-size: 14px; vertical-align: middle; }

        /* Suggestions */
        .sug-box { z-index: 1; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .sug-btn { background: white; border: 1px solid var(--navy); color: var(--navy); padding: 6px 12px; border-radius: 18px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .sug-btn:hover { background: var(--navy); color: white; }

        /* Input Area */
        #input-bar { padding: 12px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
        #user-msg { flex: 1; border: 1px solid #ddd; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 5px; color: var(--navy); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="launcher" onclick="toggleChat()"><img src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg"></div>

<div id="chat-window">
    <div id="header">
        <div class="header-profile">
            <img src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg">
            <div class="header-titles">
                <b>Loyola Thozhan</b>
                <span>● Active Assistant</span>
            </div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" onclick="clearChat()">Clear</button>
            <button class="ctrl-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="messages"></div>

    <div id="input-bar">
        <button class="icon-btn" onclick="startVoice()">🎤</button>
        <input type="text" id="user-msg" placeholder="Ask Thozhan..." onkeypress="if(event.key==='Enter') processInput()">
        <button class="icon-btn" onclick="processInput()" style="font-size:16px; font-weight:bold;">➤</button>
    </div>
</div>

<script>
    let step = 0;
    let user = { name: '', role: '', shift: '', deptNo: '' };
    const msgBox = document.getElementById('messages');
    const input = document.getElementById('user-msg');

    // Toggle Chat Visibility
    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        if (win.style.display === 'flex' && step === 0) runOnboarding();
    }

    // Add Message to UI
    function addMsg(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        let html = `<span>${text}</span>`;
        if(side === 'bot') {
            html += `<span class="speak-btn" onclick="readOut('${text.replace(/'/g, "\\'")}')">🔊</span>`;
        }
        div.innerHTML = html;
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
    }

    // Show Selection Buttons
    function showSug(list) {
        const div = document.createElement('div');
        div.className = 'sug-box';
        list.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'sug-btn';
            btn.innerText = item;
            btn.onclick = () => { addMsg(item, 'user'); handleFlow(item); };
            div.appendChild(btn);
        });
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
    }

    // Onboarding Sequence
    function runOnboarding() {
        const saved = localStorage.getItem('lt_profile');
        if(saved) {
            user = JSON.parse(saved);
            step = 100;
            addMsg(`Vanakkam, ${user.name}! Welcome back. How can I help you?`, 'bot');
            mainMenu();
        } else {
            addMsg("Vanakkam! Welcome to Loyola Thozhan. To assist you, what is your Full Name?", 'bot');
            step = 1;
        }
    }

    function processInput() {
        const val = input.value.trim();
        if(!val) return;
        addMsg(val, 'user');
        input.value = '';
        handleFlow(val);
    }

    function handleFlow(val) {
        setTimeout(() => {
            if(step === 1) {
                user.name = val;
                addMsg(`Thank you, ${val}. Please select your role:`, 'bot');
                showSug(['Student', 'Staff', 'Guest']);
                step = 2;
            } else if(step === 2) {
                user.role = val;
                if(val === 'Student') {
                    addMsg("Understood. Which shift are you in?", 'bot');
                    showSug(['Shift 1', 'Shift 2']);
                    step = 3;
                } else { completeProfile(); }
            } else if(step === 3) {
                user.shift = val;
                addMsg("Please enter your Department Number (e.g. 23-UAZ-001):", 'bot');
                step = 4;
            } else if(step === 4) {
                user.deptNo = val;
                completeProfile();
            } else {
                searchLogic(val);
            }
        }, 600);
    }

    function completeProfile() {
        localStorage.setItem('lt_profile', JSON.stringify(user));
        step = 100;
        addMsg("Profile saved professionally! What would you like to know?", 'bot');
        mainMenu();
    }

    function mainMenu() {
        showSug(['History', 'Who is Who', 'Scholarships', 'OD/ML Procedure', 'End Chat']);
    }

    // Demo Data Logic (Replace with API fetch later)
    function searchLogic(q) {
        const query = q.toLowerCase();
        if(query.includes('history')) {
            addMsg("Loyola College, founded in 1925, is a Jesuit institution. It has a rich heritage of excellence in Arts, Science, and Commerce.", 'bot');
        } else if(query.includes('who is who')) {
            addMsg("Principal: Rev. Dr. A. Louis Arockiaraj, S.J. For HOD details, visit your department office in the Jubilee/Main block.", 'bot');
        } else if(query.includes('scholarship')) {
            addMsg("For Govt/Management scholarships, visit the Scholarship Office near the Admin building with your income certificate.", 'bot');
        } else if(query.includes('end chat')) {
            addMsg("Closing Loyola Thozhan. Have a wonderful day!", 'bot');
            setTimeout(toggleChat, 1500);
        } else {
            addMsg("Processing your request through the Loyola Database...", 'bot');
        }
        setTimeout(mainMenu, 1500);
    }

    // VOICE-TO-TEXT (Speech Recognition)
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-IN';
        recognition.start();
        addMsg("Listening...", 'bot');
        recognition.onresult = (e) => {
            const result = e.results[0][0].transcript;
            input.value = result;
            processInput();
        };
    }

    // TEXT-TO-SPEECH (Read Aloud)
    function readOut(text) {
        window.speechSynthesis.cancel(); // Stop current speech
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'en-IN';
        window.speechSynthesis.speak(speech);
    }

    function clearChat() {
        msgBox.innerHTML = '';
        addMsg("Chat history cleared.", 'bot');
        mainMenu();
    }

    function logout() {
        if(confirm("Logout and clear profile?")) {
            localStorage.removeItem('lt_profile');
            location.reload();
        }
    }
</script>

</body>
</html>
